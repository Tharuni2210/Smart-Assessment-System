{% extends 'base.html' %}

{% block content %}
<div class="container">

    <h2>Categories</h2>

</div>

<div class="container text-center">

    <h2 class="mb-4">Choose Category</h2>

    <div class="row">

        {% for category in categories %}

        <div class="col-md-4 mb-4">

            <div class="card p-4 shadow">

                <h4>{{ category.name }}</h4>

                <a href="{% url 'subcategories' category.id %}" 
                   class="btn btn-primary mt-2">
                    Select
                </a>

            </div>

        </div>

        {% empty %}
            <p>No categories available</p>
        {% endfor %}

    </div>

</div>

{% endblock %}
