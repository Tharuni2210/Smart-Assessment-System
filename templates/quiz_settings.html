{% extends 'base.html' %}

{% block content %}
<div class="container" style="max-width:600px;">
    <h2 class="mb-4">Quiz Settings - {{ subcategory.name }}</h2>

    <form method="POST" action="{% url 'generate_ai' subcategory.id %}">
        {% csrf_token %}

        <div class="mb-3">
            <label><strong>Difficulty Level:</strong></label>
            {{ form.difficulty }}
        </div>

        <div class="mb-3">
            <label><strong>Number of Questions:</strong></label>
            <input type="number" name="question_count" min="1" max="10" required>
        </div>

        <div class="mb-3">
            <label>Duration (seconds)</label>
            <input type="number" name="duration" value="60">
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Start Quiz
        </button>

    </form>
</div>
{% endblock %}
